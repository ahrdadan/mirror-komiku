name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "versions/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "versions/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  rust-server:
    name: Rust Server Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Detect Rust manifest
        id: rust_manifest
        shell: bash
        run: |
          if [ -f "versions/rust-server/Cargo.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Rust build
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: versions/rust-server -> target

      - name: Format check
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        run: cargo fmt --manifest-path versions/rust-server/Cargo.toml --all -- --check

      - name: Cargo check
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        run: cargo check --manifest-path versions/rust-server/Cargo.toml --all-targets --all-features

      - name: Cargo test
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        run: cargo test --manifest-path versions/rust-server/Cargo.toml --all-targets --all-features -- --nocapture

      - name: Rust checks skipped (manifest missing)
        if: ${{ steps.rust_manifest.outputs.found != 'true' }}
        shell: bash
        run: |
          echo "::warning::Skipping rust-server checks because versions/rust-server/Cargo.toml is missing in this checkout."
          echo "::warning::If versions/rust-server is a submodule/gitlink, ensure it is committed as a normal directory or configured as a real submodule with .gitmodules."

  static:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate static files exist
        run: |
          test -f versions/static/index.html
          test -f versions/static/styles.css
          test -f versions/static/app.js
          test -f versions/static/edge-functions/api/proxy.js
          test -f versions/static/README.md

      - name: JS syntax check (frontend)
        run: node --check versions/static/app.js

      - name: JS syntax check (edge function)
        run: node --check versions/static/edge-functions/api/proxy.js
