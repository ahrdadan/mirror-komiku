name: Rust Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Rust Release
    runs-on: ubuntu-latest
    concurrency:
      group: rust-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Cargo manifest
        id: rust_manifest
        shell: bash
        run: |
          if [ -f "versions/rust-server/Cargo.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: versions/rust-server -> target

      - name: Read version from Cargo.toml
        id: version
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        shell: bash
        run: |
          VERSION="$(awk -F'\"' '/^version[[:space:]]*=/ {print $2; exit}' versions/rust-server/Cargo.toml)"
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to read version from versions/rust-server/Cargo.toml"
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check release tag already exists
        id: release_exists
        if: ${{ steps.rust_manifest.outputs.found == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
              } else {
                throw error;
              }
            }

      - name: Build release binary
        if: ${{ steps.rust_manifest.outputs.found == 'true' && steps.release_exists.outputs.exists != 'true' }}
        shell: bash
        run: cargo build --release --manifest-path versions/rust-server/Cargo.toml

      - name: Package artifact
        id: package
        if: ${{ steps.rust_manifest.outputs.found == 'true' && steps.release_exists.outputs.exists != 'true' }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUT_DIR="dist"
          BIN_NAME="mirror-komiku-v${VERSION}-linux-x86_64"
          ARCHIVE_NAME="mirror-komiku-v${VERSION}-linux-x86_64.tar.gz"
          mkdir -p "$OUT_DIR"
          cp "versions/rust-server/target/release/mirror-komiku" "$OUT_DIR/$BIN_NAME"
          chmod +x "$OUT_DIR/$BIN_NAME"
          tar -czf "$OUT_DIR/$ARCHIVE_NAME" -C "$OUT_DIR" "$BIN_NAME"
          sha256sum "$OUT_DIR/$ARCHIVE_NAME" > "$OUT_DIR/$ARCHIVE_NAME.sha256"
          sha256sum "$OUT_DIR/$BIN_NAME" > "$OUT_DIR/$BIN_NAME.sha256"
          echo "binary=$OUT_DIR/$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "archive=$OUT_DIR/$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "binary_checksum=$OUT_DIR/$BIN_NAME.sha256" >> "$GITHUB_OUTPUT"
          echo "checksum=$OUT_DIR/$ARCHIVE_NAME.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ steps.rust_manifest.outputs.found == 'true' && steps.release_exists.outputs.exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mirror-komiku ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.binary }}
            ${{ steps.package.outputs.binary_checksum }}
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

      - name: Release already exists
        if: ${{ steps.rust_manifest.outputs.found == 'true' && steps.release_exists.outputs.exists == 'true' }}
        shell: bash
        run: |
          echo "Release for ${{ steps.version.outputs.tag }} already exists. Skipping build and upload."

      - name: Release skipped (Cargo.toml missing)
        if: ${{ steps.rust_manifest.outputs.found != 'true' }}
        shell: bash
        run: |
          echo "::warning::Skipping Rust release because versions/rust-server/Cargo.toml is missing in this checkout."
          echo "::warning::Root cause: versions/rust-server is currently committed as a gitlink without .gitmodules."
